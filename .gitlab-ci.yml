stages:
  - build
  - publish

services:
  - docker:dind

build_image:
  stage: build
  image: docker:latest
  script:
    - docker build -t alpine-infosansordi .
  rules:
    - changes:
      - Dockerfile

pages:
  stage: publish
  image: alpine-infosansordi
  script:
  - apk add --no-cache mdbook pipx py3-markdown texlive texmf-dist-langfrench texmf-dist-latexextra make
  - pipx install --global linkchecker
  - for dir in Nim ; do make -C src/${dir} clean all ; done
  - mdbook build
  - mkdir public; mv book/* public
  - linkchecker public
  artifacts:
    paths:
    - public

